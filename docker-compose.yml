services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      # Required
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL:-mysql://nightjournal:nightjournal@db:3306/nightjournal}
      # Optional
      OWNER_UNION_ID: ${OWNER_UNION_ID:-}
    volumes:
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: nightjournal
      MYSQL_USER: nightjournal
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nightjournal}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # Only expose locally for debugging; remove in production
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nightjournal", "-pnightjournal"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
  app_data:
